<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<style>
  body { margin:0; padding:0; font-family:'Outfit','Inter',sans-serif; overflow:hidden; }
  #map-wrapper { position:relative; display:inline-block; user-select:none; width:100%; max-width:900px; }
  #map-img { width:100%; height:auto; display:block; border-radius:12px; }
  
  .hotspot {
    position:absolute;
    transform:translate(-50%, -50%);
    display:flex;
    flex-direction:column;
    align-items:center;
    z-index:10;
  }
  .marker {
    width:24px; height:24px; border-radius:50%;
    border:2.5px solid white; box-shadow:0 3px 8px rgba(0,0,0,0.4);
    display:flex; align-items:center; justify-content:center;
    font-size:12px; font-weight:bold; color:white;
    cursor:pointer; transition:all 0.2s;
  }
  .hotspot:hover .marker { transform:scale(1.2); box-shadow:0 5px 12px rgba(0,0,0,0.6); }
  
  .c-gray { background-color: #9e9e9e; }
  .c-orange { background-color: #ff9800; }
  .c-green { background-color: #4caf50; }
  .c-red { background-color: #ef5350; }
  
  .tooltip {
    position:absolute; top:-40px;
    background:rgba(0,0,0,0.85); color:white;
    padding:6px 12px; border-radius:6px;
    font-size:12px; font-weight:600;
    white-space:nowrap; pointer-events:none;
    opacity:0; transition:opacity 0.2s;
    transform:translateY(5px);
  }
  .hotspot:hover .tooltip { opacity:1; transform:translateY(0); }
  
  .drag-bar {
    margin-top: 15px; padding: 15px; border-radius: 10px;
    background: #e3f2fd; border: 2px dashed #1976d2;
    text-align: center; color: #0d47a1; font-weight: 600;
  }
  .drag-bar button {
    margin-left: 15px; padding: 6px 12px; background: #1976d2;
    color: white; border: none; border-radius: 6px; cursor: pointer;
    font-weight: bold; font-family: inherit;
  }
  .drag-bar button:hover { background: #115293; }
</style>
</head>
<body>
  <div id="map-wrapper">
    <img id="map-img" src="" draggable="false" />
    <div id="hotspots-container"></div>
  </div>
  <div id="drag-bar-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/streamlit-component-lib@1.3.0/dist/streamlit.js"></script>
  <script>
    let BUILDING_GROUPS = {};
    let EDIT_MODE = false;

    function renderMap(args) {
        try {
            Streamlit.setFrameHeight(600); // Fixed initial height to prevent invisible iframe
            
            if (!args || !args.status) {
                document.getElementById('drag-bar-container').innerHTML = "No status data received.";
                return;
            }

            document.getElementById('map-img').src = "data:image/jpeg;base64," + args.img_b64;
            EDIT_MODE = args.edit_mode;
            BUILDING_GROUPS = {};

            let hotspotsHtml = "";
            for (let bid in args.status) {
                let s = args.status[bid];
                let sx = s.x || 0;
                let sy = s.y || 0;
                let slabel = s.label || bid;
                BUILDING_GROUPS[bid] = {x: sx, y: sy, name: s.name};
                let cursorStyle = EDIT_MODE ? 'cursor:grab;' : 'cursor:pointer;';
                
                hotspotsHtml += `<div class="hotspot" data-id="${bid}" style="left:${sx}%; top:${sy}%;" id="hs-${bid}">
                  <div class="tooltip">${s.name}<br>(${s.occupancy}/${s.capacity} fő)</div>
                  <div class="marker c-${s.color}" style="${cursorStyle}">${slabel}</div>
                </div>`;
            }
            document.getElementById('hotspots-container').innerHTML = hotspotsHtml;

            if (EDIT_MODE) {
                document.getElementById('drag-bar-container').innerHTML = 
                  `<div class="drag-bar">
                    <span>✋ Húzd a jelölőket a megfelelő helyre, majd mentsd el!</span>
                    <button onclick="savePositions()">💾 Pozíciók Mentése</button>
                   </div>`;
            } else {
                document.getElementById('drag-bar-container').innerHTML = "";
            }

            setupInteractions();
            
            document.getElementById('map-img').onload = function() {
                Streamlit.setFrameHeight(document.body.scrollHeight + 50);
            }
            setTimeout(function() { Streamlit.setFrameHeight(document.body.scrollHeight + 50); }, 500);
        } catch (e) {
            document.getElementById('drag-bar-container').innerHTML = "Error rendering map: " + e.message;
            Streamlit.setFrameHeight(100);
        }
    }

    function savePositions() {
        Streamlit.setComponentValue({action: "save_positions", positions: BUILDING_GROUPS, ts: Date.now()});
    }

    function setupInteractions() {
        document.querySelectorAll('.hotspot').forEach(function(h) {
            if (EDIT_MODE) {
                var dragging = false, startX, startY, origLeft, origTop, mapRect;
                function onDown(cx, cy) {
                    dragging = true;
                    mapRect = document.getElementById('map-wrapper').getBoundingClientRect();
                    startX = cx; startY = cy;
                    origLeft = parseFloat(h.style.left);
                    origTop = parseFloat(h.style.top);
                    h.querySelector('.marker').style.transform = 'scale(1.4)';
                }
                function onMove(cx, cy) {
                    if (!dragging) return;
                    var dx = ((cx - startX) / mapRect.width) * 100;
                    var dy = ((cy - startY) / mapRect.height) * 100;
                    h.style.left = Math.max(2, Math.min(98, origLeft + dx)).toFixed(2) + '%';
                    h.style.top = Math.max(2, Math.min(98, origTop + dy)).toFixed(2) + '%';
                }
                function onUp() {
                    if (dragging) {
                        var bid = h.getAttribute('data-id');
                        BUILDING_GROUPS[bid].x = parseFloat(h.style.left);
                        BUILDING_GROUPS[bid].y = parseFloat(h.style.top);
                    }
                    dragging = false;
                    h.querySelector('.marker').style.transform = '';
                }
                h.addEventListener('mousedown', function(e) { onDown(e.clientX, e.clientY); e.preventDefault(); e.stopPropagation(); });
                document.addEventListener('mousemove', function(e) { if(dragging) { onMove(e.clientX, e.clientY); e.preventDefault(); } });
                document.addEventListener('mouseup', onUp);
                
                h.addEventListener('touchstart', function(e) { onDown(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive: false});
                h.addEventListener('touchmove', function(e) { onMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, {passive: false});
                h.addEventListener('touchend', onUp);
            } else {
                h.addEventListener('click', function() {
                    var bid = h.getAttribute('data-id');
                    Streamlit.setComponentValue({action: "click", bid: bid, ts: Date.now()});
                });
            }
        });
    }

    window.addEventListener("message", function(event) {
        if (event.data.type === "streamlit:render") {
            renderMap(event.data.args);
        }
    });

    sendMessageToStreamlitClient("streamlit:componentReady", {apiVersion: 1});
  </script>
</body>
</html>
